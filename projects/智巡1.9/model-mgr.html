<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞派智巡 — 地图模型</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --topnav-h: 56px;
  --sidebar-w: 200px;
  --bg: #f3f4f6;
  --panel-strong: #ffffff;
  --border: rgba(15,23,42,0.08);
  --border-strong: rgba(15,23,42,0.12);
  --text: #0f172a;
  --text-2: #475569;
  --text-3: #94a3b8;
  --primary: #2b7fff;
  --primary-soft: rgba(43,127,255,0.10);
  --primary-soft-2: rgba(43,127,255,0.06);
  --danger: #ef4444;
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
  --shadow-md: 0 4px 16px rgba(15,23,42,0.08);
  --shadow-lg: 0 10px 30px rgba(15,23,42,0.10);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}

html,body{height:100%;width:100%}
body{
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

button{font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit}
input,textarea{font-family: inherit; color: inherit; cursor: text}

/* ===== App Layout ===== */
.app{
  position: relative;
  width: 100vw; height: 100vh;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topnav-h) 1fr;
  grid-template-areas: "topnav topnav" "sidebar main";
}

/* ===== Top Nav ===== */
.topnav{
  grid-area: topnav;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: var(--panel-strong);
  border-bottom: 1px solid var(--border);
  position: relative; z-index: 50;
}
.brand{display:flex; align-items:center; gap:10px}
.brand-logo{width:30px;height:30px;display:grid;place-items:center}
.brand-logo img{width:100%;height:100%;object-fit:contain}
.brand-name{font-size:16px;font-weight:600;letter-spacing:0.5px}
.brand-name .sep{color:var(--border-strong);margin:0 4px;font-weight:300}
.brand-name .sub{color:var(--text-2);font-weight:500}
.topnav-right{display:flex;align-items:center;gap:6px}
.icon-btn{width:34px;height:34px;display:grid;place-items:center;border-radius:var(--radius-sm);color:var(--text-2);transition:background var(--transition),color var(--transition)}
.icon-btn:hover{background:var(--primary-soft-2);color:var(--primary)}
.icon-btn .lucide{width:18px;height:18px}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:999px;transition:background var(--transition);margin-left:4px}
.user-chip:hover{background:var(--primary-soft-2)}
.avatar{width:28px;height:28px;border-radius:999px;background:linear-gradient(135deg,#60a5fa,#a78bfa);display:grid;place-items:center;color:#fff;font-size:11px;font-weight:600}
.user-name{font-size:13px}
.org-select{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;min-width:160px;justify-content:space-between;transition:border-color var(--transition),background var(--transition)}
.org-select:hover{border-color:var(--primary);background:#fff}
.org-select .lucide{width:14px;height:14px;color:var(--text-3)}

/* ===== Left Sidebar ===== */
.sidebar{
  grid-area: sidebar;
  background: var(--panel-strong);
  border-right: 1px solid var(--border);
  padding: 12px 10px;
  overflow-y: auto;
  display:flex; flex-direction: column;
}
.nav-group{display:flex; flex-direction: column; gap: 4px}
.menu-item{
  display:flex; flex-direction: column; align-items:center; justify-content:center; gap: 4px;
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  color: var(--text-2);
  font-size: 12px;
  text-align:center;
  transition: background var(--transition), color var(--transition);
  position: relative;
  cursor: pointer;
}
.menu-item:hover{ background: var(--primary-soft-2); color: var(--primary) }
.menu-item.active{
  background: var(--primary);
  color: #fff;
  font-weight: 500;
  box-shadow: 0 2px 6px rgba(43,127,255,0.25);
}
.menu-item .lucide{ width: 18px; height: 18px; stroke-width: 1.8 }
.menu-item:not(.active) .lucide{ display: none }
.menu-item.anchor{ padding: 12px 6px; font-size: 13px; font-weight: 600; color: var(--text) }
.menu-item.anchor .lucide{ width: 20px; height: 20px }
.menu-item.anchor:hover{ background: var(--primary-soft); color: var(--primary) }
.sidebar-divider{ height: 1px; background: var(--border); margin: 10px 4px }
.inspect-group{ display:flex; flex-direction: column; gap: 6px; margin-top: 10px }
.inspect-item{
  height: 32px; display:flex; align-items:center; justify-content:center;
  background: #f1f4f9; border: 1px solid #e3e8ef; border-radius: var(--radius-sm);
  color: var(--text-2); font-size: 12px;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  cursor: pointer;
}
.inspect-item:hover{ background: var(--primary-soft-2); color: var(--primary); border-color: var(--primary-soft) }
.menu-item.bottom{ margin-top: auto; padding: 12px 6px }

/* ===== Main ===== */
.main{
  grid-area: main;
  display: flex;
  background: var(--bg);
  overflow: hidden;
  min-width: 0;
}
.ann-model-layout{
  flex: 1;
  display: flex;
  flex-direction: row;
  min-height: 0;
}
.ann-model-left{
  width: 220px;
  flex-shrink: 0;
  background: var(--panel-strong);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.resource-header{
  padding: 14px 16px 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  border-bottom: 1px solid var(--border);
}
.resource-list{
  flex: 1; overflow-y: auto;
  padding: 8px 8px 16px;
  display: flex; flex-direction: column;
  gap: 2px;
}
.resource-row{
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text);
  font-size: 13px;
  transition: background var(--transition);
  user-select: none;
}
.resource-row:hover{ background: var(--primary-soft-2); }
.resource-row.active{
  background: var(--primary);
  color: #fff;
  box-shadow: 0 1px 4px rgba(43,127,255,0.30);
}
.resource-row.active .res-meta{ color: rgba(255,255,255,0.85); }
.resource-row .res-icon{
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: 6px;
  flex-shrink: 0;
  background: rgba(43,127,255,0.10);
  color: var(--primary);
}
.resource-row.active .res-icon{
  background: rgba(255,255,255,0.22);
  color: #fff;
}
.resource-row .res-icon .lucide{ width: 16px; height: 16px; }
.resource-row .res-icon.icon-green{ background: rgba(22,163,74,0.12); color: #16a34a; }
.resource-row .res-icon.icon-orange{ background: rgba(245,158,11,0.12); color: #f59e0b; }
.resource-row .res-icon.icon-purple{ background: rgba(168,85,247,0.12); color: #a855f7; }
.resource-row .res-icon.icon-red{ background: rgba(239,68,68,0.12); color: #ef4444; }
.resource-row.active .res-icon.icon-orange,
.resource-row.active .res-icon.icon-green,
.resource-row.active .res-icon.icon-purple,
.resource-row.active .res-icon.icon-red{
  background: rgba(255,255,255,0.22);
  color: #fff;
}
.resource-row .res-label{ flex: 1; min-width: 0; font-weight: 500; }
.resource-row .res-meta{ color: var(--text-3); font-size: 11px; font-variant-numeric: tabular-nums; }
.resource-row .res-actions{
  width: 20px; height: 20px;
  display: grid; place-items: center;
  border-radius: 3px;
  color: inherit;
  opacity: 0;
  transition: opacity var(--transition);
}
.resource-row:hover .res-actions{ opacity: 0.8; }
.resource-sub{
  display: flex; flex-direction: column;
  gap: 2px;
  padding: 2px 0 6px 36px;
}
.resource-sub .resource-row{ padding: 6px 10px; font-size: 12px; }
.resource-sub .resource-row .res-icon{ width: 22px; height: 22px; background: transparent; color: var(--text-2); }
.resource-sub .resource-row .res-icon .lucide{ width: 14px; height: 14px; }
.resource-sub .resource-row.active .res-icon{ background: transparent; color: var(--primary); }
.resource-sub .resource-row.active{ background: transparent; color: var(--primary); box-shadow: none; font-weight: 600; }
.resource-sub .resource-row.active .res-meta{ color: var(--primary); }
.resource-sub[hidden]{ display: none; }

.ann-model-right{
  flex: 1;
  display: flex; flex-direction: column;
  min-width: 0;
  background: var(--bg);
  overflow: hidden;
}
.mp-toolbar{
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  background: var(--panel-strong);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mp-action-btn{
  height: 30px;
  padding: 0 14px;
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  color: var(--text);
  background: var(--panel-strong);
  border: 1px solid var(--border);
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  cursor: pointer;
}
.mp-action-btn:hover{ border-color: var(--primary); color: var(--primary); background: var(--primary-soft-2); }
.mp-action-btn.primary{
  background: linear-gradient(135deg, #2b7fff, #5a8eff);
  color: #fff; border-color: transparent;
  box-shadow: 0 1px 3px rgba(43,127,255,0.25);
}
.mp-action-btn.primary:hover{ background: linear-gradient(135deg, #1e6ce6, #4a7eef); border-color: transparent; }
.mp-action-btn .lucide{ width: 14px; height: 14px; }
.mp-toolbar .mp-search{
  margin-left: auto;
  width: 220px;
  height: 30px;
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: #fff;
  transition: border-color var(--transition);
}
.mp-toolbar .mp-search:focus-within{ border-color: var(--primary); }
.mp-toolbar .mp-search input{
  flex: 1; min-width: 0;
  border: 0; outline: 0;
  background: transparent;
  font-size: 12px;
  color: var(--text);
  cursor: text;
}
.mp-toolbar .mp-search .lucide{ width: 13px; height: 13px; color: var(--text-3); }
.mp-section-header{
  display: flex; align-items: center; gap: 6px;
  padding: 12px 16px 8px;
  font-size: 13px; font-weight: 600;
  color: var(--text);
  flex-shrink: 0;
}
.mp-section-header .mp-section-actions{
  margin-left: auto;
  display: flex; align-items: center; gap: 2px;
}
.mp-section-header .mp-section-actions button{
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 4px;
  color: var(--text-2);
  transition: background var(--transition), color var(--transition);
}
.mp-section-header .mp-section-actions button:hover{ background: var(--primary-soft-2); color: var(--primary); }
.mp-section-header .mp-section-actions button.active{ background: var(--primary); color: #fff; }
.mp-section-header .mp-section-actions .lucide{ width: 14px; height: 14px; }
.mp-select-bar{
  display: flex; align-items: center; gap: 12px;
  padding: 6px 16px 10px;
  font-size: 12px;
  color: var(--text-2);
  flex-shrink: 0;
}
.mp-select-bar label{ display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
.mp-select-bar input[type=checkbox]{
  width: 14px; height: 14px;
  accent-color: var(--primary);
  cursor: pointer;
}
.mp-grid-wrap{
  flex: 1; overflow-y: auto;
  padding: 0 16px 16px;
}
.file-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.file-card{
  position: relative;
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  display: flex; flex-direction: column;
}
.file-card .file-thumb{ overflow: hidden; border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.file-card:hover{
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(15,23,42,0.06);
  transform: translateY(-1px);
}
.file-card.selected{
  border-color: var(--primary);
  box-shadow: 0 0 0 1px var(--primary) inset;
}
.file-card.armed{
  border-color: var(--danger);
  box-shadow: 0 0 0 1px var(--danger) inset;
  background: #fef2f2;
}
.file-card.armed .file-name{ color: var(--danger); }
.file-card .file-check{
  position: absolute;
  top: 8px; left: 8px;
  z-index: 2;
  width: 16px; height: 16px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.85);
  display: grid; place-items: center;
  transition: opacity var(--transition);
  opacity: 0;
}
.file-card:hover .file-check,
.file-card.selected .file-check,
.file-card .file-check.checked{ opacity: 1; }
.file-card .file-check input{ width: 12px; height: 12px; accent-color: var(--primary); cursor: pointer; }
.file-card .file-thumb{
  height: 110px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, #f8fafc, #eef2f7);
  position: relative;
}
.file-card .file-thumb .thumb-icon{
  width: 56px; height: 56px;
  display: grid; place-items: center;
  border-radius: 8px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #fff;
  box-shadow: 0 4px 12px rgba(245,158,11,0.20);
}
.file-card .file-thumb .thumb-icon .lucide{ width: 28px; height: 28px; }
.file-card .file-thumb .thumb-icon.thumb-2d{
  background: linear-gradient(135deg, #34d399, #16a34a);
  box-shadow: 0 4px 12px rgba(22,163,74,0.20);
}
.file-card .file-thumb .thumb-bg{
  position: absolute; inset: 0;
  background-image:
    linear-gradient(45deg, rgba(15,23,42,0.04) 25%, transparent 25%, transparent 75%, rgba(15,23,42,0.04) 75%, rgba(15,23,42,0.04)),
    linear-gradient(45deg, rgba(15,23,42,0.04) 25%, transparent 25%, transparent 75%, rgba(15,23,42,0.04) 75%, rgba(15,23,42,0.04));
  background-size: 16px 16px;
  background-position: 0 0, 8px 8px;
}
.file-card .file-actions{
  position: absolute;
  top: 8px; right: 8px;
  z-index: 2;
  width: 22px; height: 22px;
  display: grid; place-items: center;
  border-radius: 4px;
  color: #fff;
  background: rgba(15,23,42,0.4);
  opacity: 0;
  transition: opacity var(--transition), background var(--transition);
}
.file-card:hover .file-actions{ opacity: 1; }
.file-card .file-actions:hover{ background: rgba(15,23,42,0.7); }
.file-card .file-actions .lucide{ width: 14px; height: 14px; }
.file-card .file-info{
  padding: 8px 10px 10px;
  display: flex; flex-direction: column;
  gap: 4px;
}
.file-card .file-name{
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-height: 1.35;
}
.file-card .file-meta-row{
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.5;
}
.file-card .file-meta-row .meta-label{ color: var(--text-2); }
.file-menu{
  position: absolute;
  top: 32px; right: 8px;
  z-index: 50;
  min-width: 120px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  padding: 4px;
  display: none;
}
.file-menu.show{ display: block; }
.file-menu button{
  width: 100%;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--text);
  text-align: left;
  transition: background var(--transition);
}
.file-menu button:hover{ background: var(--primary-soft-2); color: var(--primary); }
.file-menu button.danger:hover{ background: rgba(239,68,68,0.10); color: var(--danger); }
.file-menu button .lucide{ width: 13px; height: 13px; }
.mp-batch-bar{
  display: none;
  align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--primary-soft);
  border-bottom: 1px solid var(--primary-soft);
  font-size: 12px;
  color: var(--text);
  flex-shrink: 0;
}
.mp-batch-bar.show{ display: flex; }
.mp-batch-bar .batch-text{ font-weight: 600; color: var(--primary); }
.mp-batch-bar button{
  height: 26px; padding: 0 10px;
  display: inline-flex; align-items: center; gap: 4px;
  border-radius: 4px;
  background: #fff;
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text);
  transition: background var(--transition), border-color var(--transition), color var(--transition);
}
.mp-batch-bar button:hover{ border-color: var(--primary); color: var(--primary); }
.mp-batch-bar button.danger:hover{ border-color: var(--danger); color: var(--danger); }
.mp-batch-bar .batch-spacer{ flex: 1; }
.mp-batch-bar .batch-clear{ color: var(--text-3); border-color: transparent; background: transparent; }
.mp-batch-bar .batch-clear:hover{ color: var(--text); }
.mp-batch-bar .lucide{ width: 12px; height: 12px; }
.mp-selected-bar{
  display: none;
  align-items: center; gap: 12px;
  padding: 10px 16px;
  background: var(--panel-strong);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-2);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.mp-selected-bar.show{ display: flex; }
.mp-selected-bar .sel-name{
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-right: 8px;
}
.mp-selected-bar .sel-name .lucide{ width: 14px; height: 14px; color: var(--primary); }
.mp-selected-bar .sel-meta{ display: flex; flex-wrap: wrap; gap: 12px; }
.mp-selected-bar .sel-meta span b{ color: var(--text); font-weight: 600; }
.mp-selected-bar .sel-close{
  margin-left: auto;
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 4px;
  color: var(--text-2);
  cursor: pointer;
}
.mp-selected-bar .sel-close:hover{ background: var(--primary-soft-2); color: var(--primary); }
.mp-footer{
  display: flex; align-items: center;
  padding: 8px 16px;
  background: var(--panel-strong);
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-2);
  flex-shrink: 0;
}
.mp-footer .mp-usage{ display: inline-flex; align-items: center; gap: 6px; }
.mp-footer .mp-usage .lucide{ width: 13px; height: 13px; color: var(--primary); }
.mp-footer .mp-usage .usage-num{ color: var(--text); font-weight: 600; }
.mp-footer .mp-pagination{
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 8px;
}
.mp-footer .page-size{
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: #fff;
  font-size: 12px;
  cursor: pointer;
}
.mp-footer .page-size .lucide{ width: 12px; height: 12px; color: var(--text-3); }
.mp-footer .pager{ display: inline-flex; align-items: center; gap: 4px; }
.mp-footer .pager button{
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 4px;
  color: var(--text-2);
  transition: background var(--transition), color var(--transition);
}
.mp-footer .pager button:hover:not(:disabled){ background: var(--primary-soft-2); color: var(--primary); }
.mp-footer .pager button:disabled{ opacity: 0.4; cursor: not-allowed; }
.mp-footer .pager button.active{ background: var(--primary); color: #fff; }
.mp-footer .pager button .lucide{ width: 12px; height: 12px; }
.mp-footer .page-jump{ display: inline-flex; align-items: center; gap: 4px; }
.mp-footer .page-jump input{
  width: 36px; height: 24px;
  padding: 0 6px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: #fff;
  font-size: 12px;
  outline: none;
}
.mp-footer .page-jump input:focus{ border-color: var(--primary); }
.mp-placeholder{
  flex: 1;
  display: grid; place-items: center;
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
  padding: 40px;
}
.mp-placeholder .ph-icon{
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--primary-soft-2);
  color: var(--primary);
  display: grid; place-items: center;
  margin: 0 auto 12px;
}
.mp-placeholder .ph-icon .lucide{ width: 28px; height: 28px; }

#view-notice{
  position: fixed; left: 50%; bottom: 24px;

/* ======================================================
   State
   ====================================================== */
let MOCK_models = [];
let activeResourceTab = 'model';
let mpPage = 1;
let mpPageSize = 50;
let mpSearchText = '';
let selectedModels = new Set();
let activeModelMenuId = null;
let selModel = null;
let pendingDisableId = null;

var RESOURCE_CATS = {
  model:   { id:'model',   label:'模型',     icon:'box',         iconCls:'',          size:'852.7 MB', expandable:true, hasData:true },
  twod:    { id:'twod',    label:'二维模型', icon:'image',       iconCls:'',          size:'69.8 MB',  parent:'model', hasData:true },
  ortho:   { id:'ortho',   label:'正射',     icon:'map',         iconCls:'',          size:'69.8 MB',  parent:'twod', hasData:true },
  threed:  { id:'threed',  label:'三维模型', icon:'box',         iconCls:'',          size:'782.9 MB', parent:'model', hasData:true },
  mesh:    { id:'mesh',    label:'Mesh',      icon:'grid-3x3',    iconCls:'',          size:'320.5 MB', parent:'threed', hasData:true },
  ptcloud: { id:'ptcloud', label:'点云',      icon:'cloud',       iconCls:'',          size:'462.4 MB', parent:'threed', hasData:true },
  photo:   { id:'photo',   label:'媒体',     icon:'image',       iconCls:'icon-green',size:'0 MB',     hasData:true },
  gcp:     { id:'gcp',     label:'像控点管理',icon:'crosshair',  iconCls:'icon-orange',size:'0 个 >',   placeholder:true },
  design:  { id:'design',  label:'设计文件', icon:'file-text',   iconCls:'icon-purple',size:'0 MB',     placeholder:true },
  trash:   { id:'trash',   label:'回收站',   icon:'trash-2',     iconCls:'icon-red',  size:'0 MB',     placeholder:true },
};

const ASSET_TYPES = [
  {id:'bridge',n:'桥梁'},{id:'slope',n:'边坡'},{id:'tunnel',n:'隧道'},
  {id:'traffic-safety',n:'交安设施'},{id:'geo-hazard',n:'地质灾害'},
  {id:'facility',n:'服务设施'},{id:'escape-lane',n:'避险车道'},
];
const MODEL_TYPES_3D = [
  {id:'bim',n:'BIM'},{id:'mesh',n:'Mesh'},{id:'pointcloud',n:'点云'},{id:'oblique',n:'倾斜摄影'},{id:'osgb',n:'OSGB'},
];
const MODEL_STATUS_2D = [{id:'ready',n:'已完成'},{id:'pending',n:'处理中'},{id:'failed',n:'失败'}];

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showNotice(msg) {
  const n = document.getElementById('view-notice');
  n.textContent = msg;
  n.classList.add('show');
  clearTimeout(n._t);
  n._t = setTimeout(() => n.classList.remove('show'), 2000);
}

/* ======================================================
   Mock data
   ====================================================== */
function seedDemoModels() {

  MOCK_models = [
    {id:'md-1',name:'北大村特大桥 BIM 模型',type:'3d',subtype:'bim',assetType:'bridge',fileFormat:'gltf',fileSize:256,status:'ready',collectedAt:'2026.04.01',updatedAt:'2026.05.10',owner:'张工',visible:true,enabled:true,selected:false,linkedStake:'K12+300',description:'LOD300 精度,包含上部结构、桥墩、支座、桥面系全构件'},
    {id:'md-2',name:'阳宗隧道机电 BIM',type:'3d',subtype:'bim',assetType:'tunnel',fileFormat:'ifc',fileSize:180,status:'ready',collectedAt:'2026.05.15',updatedAt:'2026.05.15',owner:'王工',visible:true,enabled:true,selected:false,linkedStake:'K45+800',description:'隧道机电设施精细化 BIM,含通风、照明、消防、监控'},
    {id:'md-3',name:'K34+200 边坡激光点云',type:'3d',subtype:'pointcloud',assetType:'slope',fileFormat:'las',fileSize:420,status:'pending',collectedAt:'2026.03.20',updatedAt:'2026.04.15',owner:'系统',visible:true,enabled:true,selected:false,linkedStake:'K34+200',description:'无人机激光雷达扫描重建,密度约 800 pts/m²'},

    {id:'md-6',name:'服务区 BIM 综合模型',type:'3d',subtype:'bim',assetType:'facility',fileFormat:'gltf',fileSize:198,status:'ready',collectedAt:'2026.04.20',updatedAt:'2026.05.01',owner:'王工',visible:true,enabled:true,selected:false,linkedStake:'K30+400',description:'阳宗海服务区建筑及设施 BIM'},
    {id:'md-7',name:'桥梁BIM模型(已停用)',type:'3d',subtype:'bim',assetType:'bridge',fileFormat:'gltf',fileSize:128,status:'ready',collectedAt:'2026.02.10',updatedAt:'2026.02.10',owner:'李工',visible:false,enabled:false,selected:false,linkedStake:'',description:'已停用模型示例'},
    {id:'md-8',name:'呈贡正射影像(DOM)',type:'2d',subtype:'ortho',assetType:'facility',fileFormat:'tif',fileSize:850,status:'ready',collectedAt:'2026.06.30',updatedAt:'2026.06.30',owner:'张工',visible:true,enabled:true,selected:false,linkedStake:'',description:'正射影像 DOM,覆盖呈贡运营中心'},
    {id:'md-9',name:'边坡正射影像',type:'2d',subtype:'ortho',assetType:'slope',fileFormat:'tif',fileSize:620,status:'ready',collectedAt:'2026.06.15',updatedAt:'2026.06.20',owner:'系统',visible:true,enabled:true,selected:false,linkedStake:'K34+200',description:'K34边坡区域正射影像'},
  ];

/* ======================================================
   Render
   ====================================================== */
function getCurrentModels() {
  var list = MOCK_models.slice();
  if (activeResourceTab === 'twod') return list.filter(function(m){ return m.type === '2d'; });
  if (activeResourceTab === 'ortho') return list.filter(function(m){ return m.type === '2d' && m.subtype === 'ortho'; });
  if (activeResourceTab === 'threed') return list.filter(function(m){ return m.type === '3d'; });
  if (activeResourceTab === 'mesh') return list.filter(function(m){ return m.type === '3d' && m.subtype === 'mesh'; });
  if (activeResourceTab === 'ptcloud') return list.filter(function(m){ return m.type === '3d' && m.subtype === 'pointcloud'; });
  if (activeResourceTab === 'model') return list;
  return [];
}

function renderResourceList() {
  var container = document.getElementById('resource-list');
  if (!container) return;
  var html = '';
  var mainCats = Object.values(RESOURCE_CATS).filter(function(c){ return !c.parent; });
  mainCats.forEach(function(cat) {
    var isActive = activeResourceTab === cat.id;
    var subs = Object.values(RESOURCE_CATS).filter(function(c){ return c.parent === cat.id; });
    var hasActiveChild = subs.some(function(c){ return c.id === activeResourceTab; });
    var isExpanded = cat.expandable && (activeResourceTab === cat.id || hasActiveChild);
    html += '<div class="resource-row ' + (isActive && !isExpanded ? 'active' : '') + '" data-res-cat="' + cat.id + '">';
    html += '  <span class="res-icon ' + cat.iconCls + '"><i data-lucide="' + cat.icon + '"></i></span>';
    html += '  <span class="res-label">' + cat.label + '</span>';
    html += '  <span class="res-meta">' + cat.size + '</span>';
    html += '  <span class="res-actions"><i data-lucide="chevron-right"></i></span>';
    html += '</div>';
    if (cat.expandable) {
      html += '<div class="resource-sub" ' + (isExpanded ? '' : 'hidden') + '>';
      subs.forEach(function(sub) {
        var subActive = activeResourceTab === sub.id;
        html += '<div class="resource-row ' + (subActive ? 'active' : '') + '" data-res-cat="' + sub.id + '">';
        html += '  <span class="res-icon ' + sub.iconCls + '"><i data-lucide="' + sub.icon + '"></i></span>';
        html += '  <span class="res-label">' + sub.label + '</span>';
        html += '  <span class="res-meta">' + sub.size + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }
  });
  container.innerHTML = html;
}

function renderMpToolbar() {
  var titleEl = document.getElementById('mp-section-title');
  if (!titleEl) return;
  var cat = RESOURCE_CATS[activeResourceTab];
  titleEl.textContent = cat ? cat.label + ' 文件' : '模型文件';
}

function renderMpSelectedBar() {
  var bar = document.getElementById('mp-selected-bar');
  if (!bar) return;
  if (!selModel) { bar.classList.remove('show'); bar.innerHTML = ''; return; }
  var m = selModel;
  var subtypeLabel = (MODEL_TYPES_3D.find(function(t){ return t.id === m.subtype; }) || {}).n
    || (MODEL_STATUS_2D.find(function(s){ return s.id === m.subtype; }) || {}).n
    || m.subtype || '—';
  var assetLabel = (ASSET_TYPES.find(function(a){ return a.id === m.assetType; }) || {}).n || m.assetType || '—';
  var statusLabel = m.status === 'ready' ? '已完成' : m.status === 'pending' ? '处理中' : m.status === 'failed' ? '失败' : m.status;
  var sizeLabel = m.fileSize ? m.fileSize + ' MB' : '—';
  var formatLabel = (m.fileFormat || '').toUpperCase() || '—';
  bar.innerHTML =
    '<div class="sel-name">' +
      '<i data-lucide="' + (m.type === '3d' ? 'box' : 'image') + '"></i>' +
      '<span>' + esc(m.name) + '</span>' +
      '<button class="sel-close" data-sel-close title="取消选择"><i data-lucide="x"></i></button>' +
    '</div>' +
    '<div class="sel-meta">' +
      '<span>类型:<b>' + subtypeLabel + '</b></span>' +
      '<span>状态:<b>' + statusLabel + '</b></span>' +
      '<span>资产:<b>' + assetLabel + '</b></span>' +
      '<span>格式:<b>' + formatLabel + '</b> · <b>' + sizeLabel + '</b></span>' +
      '<span>采集:<b>' + esc(m.collectedAt || '') + '</b></span>' +
      '<span>上传:<b>' + esc(m.owner || '—') + '</b></span>' +
      (m.linkedStake ? '<span>桩号:<b>' + esc(m.linkedStake) + '</b></span>' : '') +
    '</div>';
  bar.classList.add('show');
}

function renderMpBatchBar() {
  var bar = document.getElementById('mp-batch-bar');
  if (!bar) return;
  if (!selectedModels.size) { bar.classList.remove('show'); bar.innerHTML = ''; return; }
  bar.innerHTML =
    '<span class="batch-text">已选 ' + selectedModels.size + '</span>' +
    '<button data-batch-act="vis-on"><i data-lucide="eye"></i>批量显示</button>' +
    '<button data-batch-act="vis-off"><i data-lucide="eye-off"></i>批量隐藏</button>' +
    '<button class="danger" data-batch-act="delete"><i data-lucide="trash-2"></i>批量删除</button>' +
    '<span class="batch-spacer"></span>' +
    '<button class="batch-clear" data-batch-act="clear"><i data-lucide="x"></i>清空</button>';
  bar.classList.add('show');
}

function renderMpSelectBar(total) {
  var selCountEl = document.getElementById('mp-select-count');
  var selAllEl = document.getElementById('mp-select-all');
  if (selCountEl) selCountEl.textContent = '已选 (' + selectedModels.size + '/' + total + ')';
  if (selAllEl) {
    selAllEl.checked = total > 0 && selectedModels.size === total;
    selAllEl.indeterminate = selectedModels.size > 0 && selectedModels.size < total;
  }
}

function renderFileCard(m) {
  var checked = selectedModels.has(m.id);
  var armed = pendingDisableId === m.id;
  var selected = selModel && selModel.id === m.id;
  var is2d = m.type === '2d';
  var thumbClass = is2d ? 'thumb-icon thumb-2d' : 'thumb-icon';
  var thumbIcon = is2d ? 'image' : 'folder';
  return ''
    + '<div class="file-card ' + (selected ? 'selected' : '') + ' ' + (armed ? 'armed' : '') + '" data-mid="' + m.id + '">'
    +   '<div class="file-check ' + (checked ? 'checked' : '') + '"><input type="checkbox" data-card-check="' + m.id + '" ' + (checked ? 'checked' : '') + ' /></div>'
    +   '<button class="file-actions" data-card-menu="' + m.id + '" title="更多"><i data-lucide="more-horizontal"></i></button>'
    +   '<div class="file-thumb">'
    +     '<div class="thumb-bg"></div>'
    +     '<div class="' + thumbClass + '"><i data-lucide="' + thumbIcon + '"></i></div>'
    +   '</div>'
    +   '<div class="file-info">'
    +     '<div class="file-name">' + esc(m.name) + '</div>'
    +     '<div class="file-meta-row"><span class="meta-label">创建时间:</span>' + esc(m.collectedAt || '—') + '</div>'
    +     '<div class="file-meta-row"><span class="meta-label">采集时间:</span>' + esc(m.updatedAt || m.collectedAt || '—') + '</div>'
    +   '</div>'
    +   '<div class="file-menu" data-menu-for="' + m.id + '" style="min-width:180px;">'
    +     '<button data-card-act="unload" data-mid="' + m.id + '"><i data-lucide="map-off"></i>在地图上取消加载</button>'
    +     '<button data-card-act="set-time" data-mid="' + m.id + '"><i data-lucide="clock"></i>设置采集时间</button>'
    +     '<button data-card-act="copy-to" data-mid="' + m.id + '"><i data-lucide="copy"></i>复制至其他项目</button>'
    +     '<button data-card-act="move" data-mid="' + m.id + '"><i data-lucide="folder-input"></i>移动</button>'
    +     '<button data-card-act="rename" data-mid="' + m.id + '"><i data-lucide="pencil"></i>重命名</button>'
    +     '<button data-card-act="vis" data-mid="' + m.id + '"><i data-lucide="' + (m.enabled && m.visible ? 'eye-off' : 'eye') + '"></i>' + (m.enabled && m.visible ? '隐藏' : '显示') + '</button>'
    +     '<button class="danger" data-card-act="delete" data-mid="' + m.id + '"><i data-lucide="trash-2"></i>删除</button>'
    +   '</div>'
    + '</div>';
}

function renderMpGrid() {
  var wrap = document.getElementById('mp-grid-wrap');
  if (!wrap) return;
  var cat = RESOURCE_CATS[activeResourceTab];
  if (cat && cat.placeholder) {
    wrap.innerHTML = '<div class="mp-placeholder"><div class="ph-icon"><i data-lucide="' + cat.icon + '"></i></div><div>' + cat.label + '功能即将上线</div></div>';
    return;
  }
  if (cat && cat.id === 'photo') {
    wrap.innerHTML = '<div class="mp-placeholder"><div class="ph-icon"><i data-lucide="image"></i></div><div>媒体库暂无文件</div></div>';
    return;
  }
  var list = getCurrentModels();
  if (mpSearchText) {
    var q = mpSearchText.toLowerCase();
    list = list.filter(function(m){ return (m.name || '').toLowerCase().indexOf(q) >= 0; });
  }
  var total = list.length;
  var start = (mpPage - 1) * mpPageSize;
  var pageItems = list.slice(start, start + mpPageSize);
  if (pageItems.length === 0) {
    wrap.innerHTML = '<div class="mp-placeholder"><div class="ph-icon"><i data-lucide="search-x"></i></div><div>' + (mpSearchText ? '未找到匹配的文件' : '此分类下暂无文件') + '</div></div>';
  } else {
    wrap.innerHTML = '<div class="file-grid">' + pageItems.map(renderFileCard).join('') + '</div>';
  }
  renderMpSelectBar(total);
}

function renderMpPagination(total) {
  var totalPages = Math.max(1, Math.ceil(total / mpPageSize));
  if (mpPage > totalPages) mpPage = totalPages;
  var pagerEl = document.querySelector('.mp-footer .pager');
  if (!pagerEl) return;
  var html = '<button data-pager="prev" title="上一页"' + (mpPage <= 1 ? ' disabled' : '') + '><i data-lucide="chevron-left"></i></button>';
  html += '<button class="active" data-pager="cur">' + mpPage + '</button>';
  html += '<button data-pager="next" title="下一页"' + (mpPage >= totalPages ? ' disabled' : '') + '><i data-lucide="chevron-right"></i></button>';
  pagerEl.innerHTML = html;
  var jumpInput = document.getElementById('mp-jump-page');
  if (jumpInput && document.activeElement !== jumpInput) jumpInput.value = mpPage;
}

function getCurrentTotal() {
  var cat = RESOURCE_CATS[activeResourceTab];
  if (!cat || cat.placeholder || cat.id === 'photo') return 0;
  return getCurrentModels().length;
}

function renderModelPanel() {
  renderResourceList();
  renderMpToolbar();
  renderMpSelectedBar();
  renderMpBatchBar();
  renderMpGrid();
  renderMpPagination(getCurrentTotal());
  activeModelMenuId = null;
  if (window.lucide && window.lucide.createIcons) lucide.createIcons();
}

/* ======================================================
   Events
   ====================================================== */
function bindEvents() {
  document.addEventListener('click', function(e) {
    var resRow = e.target.closest('[data-res-cat]');
    if (resRow) {
      var cat = resRow.dataset.resCat;
      if (!RESOURCE_CATS[cat]) return;
      activeResourceTab = cat;
      mpPage = 1;
      selectedModels = new Set();
      selModel = null;
      renderModelPanel();
      return;
    }
    var actionBtn = e.target.closest('[data-action]');
    if (actionBtn) {
      var act = actionBtn.dataset.action;
      if (act === 'model-import') { showNotice('导入功能敬请期待'); return; }
      if (act === 'model-new-folder') {
        var name = window.prompt('请输入新文件夹名称', '新文件夹');
        if (name === null) return;
        var trimmed = (name || '').trim();
        if (!trimmed) { showNotice('文件夹名不能为空'); return; }
        showNotice('已新建文件夹:' + trimmed);
        return;
      }
      if (act === 'mp-refresh') { renderModelPanel(); showNotice('已刷新'); return; }
      if (act === 'mp-view-list' || act === 'mp-view-grid') {
        document.querySelectorAll('[data-action="mp-view-list"], [data-action="mp-view-grid"]').forEach(function(b){
          b.classList.toggle('active', b.dataset.action === act);
        });
        showNotice(act === 'mp-view-list' ? '列表视图(暂未实现)' : '网格视图');
        return;
      }
      showNotice('占位:' + act);
      return;
    }
    var selClose = e.target.closest('[data-sel-close]');
    if (selClose) {
      selModel = null;
      MOCK_models.forEach(function(m){ m.selected = false; });
      renderModelPanel();
      return;
    }
    var menuBtn = e.target.closest('[data-card-menu]');
    if (menuBtn) {
      e.stopPropagation();
      var mid = menuBtn.dataset.cardMenu;
      document.querySelectorAll('.file-menu.show').forEach(function(m){ m.classList.remove('show'); });
      var menu = document.querySelector('[data-menu-for="' + mid + '"]');
      if (menu) {
        var open = !menu.classList.contains('show');
        menu.classList.toggle('show', open);
        activeModelMenuId = open ? mid : null;
      }
      return;
    }
    var cardAct = e.target.closest('[data-card-act]');
    if (cardAct) {
      e.stopPropagation();
      var act2 = cardAct.dataset.cardAct;
      var id2 = cardAct.dataset.mid;
      var m = MOCK_models.find(function(x){ return x.id === id2; });
      if (!m) return;
      if (act2 === 'vis') {
        m.visible = !m.visible; m.enabled = m.visible;
        renderModelPanel();
        showNotice(m.visible ? '已显示:' + m.name : '已隐藏:' + m.name);
        return;
      }
      if (act2 === 'unload') { showNotice('已取消加载（占位）:' + m.name); renderModelPanel(); return; }
      if (act2 === 'set-time') { showNotice('设置采集时间（占位）:' + m.name); renderModelPanel(); return; }
      if (act2 === 'copy-to') { showNotice('复制至其他项目（占位）:' + m.name); renderModelPanel(); return; }
      if (act2 === 'move') { showNotice('移动（占位）:' + m.name); renderModelPanel(); return; }
      if (act2 === 'rename') { showNotice('重命名（占位）:' + m.name); renderModelPanel(); return; }
      if (act2 === 'delete') {
        if (pendingDisableId === id2) {
          pendingDisableId = null;
          MOCK_models = MOCK_models.filter(function(x){ return x.id !== id2; });
          selectedModels.delete(id2);
          if (selModel && selModel.id === id2) selModel = null;
          renderModelPanel();
          showNotice('已删除:' + m.name);
        } else {
          pendingDisableId = id2;
          renderModelPanel();
        }
        return;
      }
    }
    var cardCheck = e.target.closest('[data-card-check]');
    if (cardCheck) {
      e.stopPropagation();
      var cid = cardCheck.dataset.cardCheck;
      if (selectedModels.has(cid)) selectedModels.delete(cid);
      else selectedModels.add(cid);
      renderMpBatchBar();
      renderMpSelectBar(getCurrentTotal());
      var card = cardCheck.closest('.file-card');
      if (card) {
        var cb = card.querySelector('.file-check');
        if (cb) cb.classList.toggle('checked', selectedModels.has(cid));
      }
      return;
    }
    if (e.target.id === 'mp-select-all') {
      var checked = e.target.checked;
      selectedModels = new Set();
      if (checked) {
        getCurrentModels().forEach(function(m){
          if (mpSearchText && (m.name || '').toLowerCase().indexOf(mpSearchText.toLowerCase()) < 0) return;
          selectedModels.add(m.id);
        });
      }
      renderMpGrid();
      renderMpBatchBar();
      return;
    }
    var card = e.target.closest('.file-card');
    if (card) {
      var mid2 = card.dataset.mid;
      var m2 = MOCK_models.find(function(x){ return x.id === mid2; });
      if (!m2) return;
      MOCK_models.forEach(function(x){ x.selected = false; });
      m2.selected = true;
      selModel = m2;
      renderMpSelectedBar();
      document.querySelectorAll('.file-card').forEach(function(c){ c.classList.toggle('selected', c.dataset.mid === mid2); });
      // 双击或单击空白以外的卡片 → 打开模型查看器
      var tag = (m2.type === '2d') ? '正射'
              : (m2.subtype === 'pointcloud') ? '点云'
              : (m2.subtype === 'mesh') ? 'Mesh'
              : (m2.subtype === 'oblique') ? '倾斜摄影'
              : (m2.subtype === 'bim') ? 'BIM'
              : '模型';
      var url = 'model-viewer.html?name=' + encodeURIComponent(m2.name) + '&tag=' + encodeURIComponent(tag);
      window.open(url, '_blank');
      showNotice('已打开:' + m2.name);
      return;
    }
    var batchBtn = e.target.closest('[data-batch-act]');
    if (batchBtn) {
      var bact = batchBtn.dataset.batchAct;
      if (bact === 'clear') { selectedModels = new Set(); renderModelPanel(); return; }
      if (bact === 'vis-on') {
        MOCK_models.forEach(function(m){ if (selectedModels.has(m.id)) { m.visible = true; m.enabled = true; } });
        renderModelPanel(); showNotice('已显示 ' + selectedModels.size + ' 个'); return;
      }
      if (bact === 'vis-off') {
        MOCK_models.forEach(function(m){ if (selectedModels.has(m.id)) { m.visible = false; m.enabled = false; } });
        renderModelPanel(); showNotice('已隐藏 ' + selectedModels.size + ' 个'); return;
      }
      if (bact === 'delete') {
        if (pendingDisableId === '__batch__') {
          pendingDisableId = null;
          var ids = Array.from(selectedModels);
          MOCK_models = MOCK_models.filter(function(m){ return !selectedModels.has(m.id); });
          selectedModels = new Set();
          if (selModel && ids.indexOf(selModel.id) >= 0) selModel = null;
          renderModelPanel();
          showNotice('已删除 ' + ids.length + ' 个');
        } else {
          pendingDisableId = '__batch__';
          showNotice('再次点击批量删除确认');
          setTimeout(function(){ if (pendingDisableId === '__batch__') pendingDisableId = null; }, 5000);
        }
        return;
      }
    }
    var pagerBtn = e.target.closest('[data-pager]');
    if (pagerBtn) {
      var total = getCurrentTotal();
      var totalPages = Math.max(1, Math.ceil(total / mpPageSize));
      if (pagerBtn.dataset.pager === 'prev' && mpPage > 1) mpPage--;
      else if (pagerBtn.dataset.pager === 'next' && mpPage < totalPages) mpPage++;
      renderMpGrid();
      renderMpPagination(total);
      if (window.lucide && window.lucide.createIcons) lucide.createIcons();
      return;
    }
    if (activeModelMenuId && !e.target.closest('[data-card-menu]') && !e.target.closest('.file-menu')) {
      document.querySelectorAll('.file-menu.show').forEach(function(m){ m.classList.remove('show'); });
      activeModelMenuId = null;
    }
  });

  var searchInput = document.getElementById('mp-search-input');
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      mpSearchText = this.value || '';
      mpPage = 1;
      renderMpGrid();
      renderMpPagination(getCurrentTotal());
      if (window.lucide && window.lucide.createIcons) lucide.createIcons();
    });
  }
  var jumpInput = document.getElementById('mp-jump-page');
  if (jumpInput) {
    jumpInput.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      var v = parseInt(this.value, 10);
      if (isNaN(v) || v < 1) v = 1;
      var total = getCurrentTotal();
      var totalPages = Math.max(1, Math.ceil(total / mpPageSize));
      if (v > totalPages) v = totalPages;
      mpPage = v;
      renderMpGrid();
      renderMpPagination(total);
      if (window.lucide && window.lucide.createIcons) lucide.createIcons();
    });
  }
  var pageSizeEl = document.getElementById('mp-page-size');
  if (pageSizeEl) {
    pageSizeEl.addEventListener('click', function() {
      var sizes = [50, 20, 100];
      var idx = sizes.indexOf(mpPageSize);
      mpPageSize = sizes[(idx + 1) % sizes.length];
      mpPage = 1;
      this.querySelector('span').textContent = mpPageSize + ' / 页';
      renderMpGrid();
      renderMpPagination(getCurrentTotal());
      if (window.lucide && window.lucide.createIcons) lucide.createIcons();
    });
  }
}

seedDemoModels();
bindEvents();
renderModelPanel();

/* ======================================================
   Post-Import Form (从 model-import.html 上传完成后回跳)
   ====================================================== */
(function bindImportForm() {
  var overlay = document.getElementById('import-form-overlay');

  function openForm() {
    overlay.style.display = 'flex';
    // Set defaults
    var today = new Date().toISOString().slice(0, 10);
    document.getElementById('imp-uploaded').value = today;
    document.getElementById('imp-collected').value = '';
    document.getElementById('imp-name').value = '';
    document.getElementById('imp-stake').value = '';
  }
  function closeForm() { overlay.style.display = 'none'; }

  // Detect ?import=1 from model-import.html redirect
  if (window.location.search.indexOf('import=1') >= 0) {
    openForm();
    // Clean URL
    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, '', window.location.pathname);
    }
  }

  document.getElementById('import-form-close').addEventListener('click', closeForm);
  document.getElementById('import-form-cancel').addEventListener('click', closeForm);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeForm(); });

  document.getElementById('import-form-save').addEventListener('click', function() {
    var name = document.getElementById('imp-name').value.trim();
    if (!name) { showNotice('请输入模型名称'); return; }
    var impType = document.getElementById('imp-type').value;
    var impAsset = document.getElementById('imp-asset').value;
    var collectedAt = document.getElementById('imp-collected').value;
    var uploadedAt = document.getElementById('imp-uploaded').value;
    var stake = document.getElementById('imp-stake').value.trim();

    var model = {
      id: 'md-' + Date.now(),
      name: name,
      type: impType, subtype: impType === '2d' ? 'ortho' : 'bim', assetType: impAsset,
      fileFormat: 'gltf', fileSize: Math.floor(Math.random() * 500 + 50),
      status: 'ready',
      collectedAt: collectedAt || new Date().toISOString().slice(0, 10),
      updatedAt: uploadedAt || new Date().toISOString().slice(0, 10),
      owner: '李亚伟', visible: true, enabled: true, selected: false,
      linkedStake: stake,
      lat: (24.85 + Math.random() * 0.08).toFixed(4),
      lng: (102.88 + Math.random() * 0.08).toFixed(4),
      description: '',
    };
    MOCK_models.unshift(model);
    closeForm();
    renderModelPanel();
    showNotice('已导入：' + model.name);
  });
})();
</script>
