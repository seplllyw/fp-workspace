<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试场点云 — 飞派智巡</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%;width:100%}
body{
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: #000;
  color: #e2e8f0;
  overflow: hidden;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

button{font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit}
a{color:inherit;text-decoration:none}

/* ===== Stage ===== */
.stage{
  position: relative;
  width: 100vw;
  height: 100vh;
  background:
    radial-gradient(ellipse at center, #0a0a0a 0%, #000 70%),
    #000;
  overflow: hidden;
}

/* ===== Grid Background (mock 3D space) ===== */
.grid-bg{
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(120,120,120,0.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,120,120,0.18) 1px, transparent 1px);
  background-size: 48px 48px;
  background-position: center center;
  perspective: 1000px;
  transform-style: preserve-3d;
  pointer-events: none;
  opacity: 0.85;
}

/* ===== 3D Mock Point Cloud (CSS voxels) ===== */
.pointcloud{
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) rotateX(58deg) rotateZ(-18deg);
  width: 720px; height: 440px;
  transform-style: preserve-3d;
  pointer-events: none;
  filter: drop-shadow(0 30px 50px rgba(0,0,0,0.6));
}
.vox{
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 1px;
  transform-style: preserve-3d;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25);
}
.vox.green{ background: #2f7a3a; }
.vox.darkgreen{ background: #1f5128; }
.vox.lightgreen{ background: #6cae3d; }
.vox.olive{ background: #5a6b2a; }
.vox.brown{ background: #8a5a32; }
.vox.gray{ background: #5a5a5a; }
.vox.tan{ background: #b5a485; }
.vox.red{ background: #c63d2e; }
.vox.cyan{ background: #2d8a9a; }
.vox.blue{ background: #2b4a7a; }
.vox.white{ background: #c9c9c9; }

/* ===== Top Info Bar ===== */
.topbar{
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex; align-items: center; gap: 14px;
  padding: 14px 22px;
  background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%);
  z-index: 20;
}
.topbar .title{
  font-size: 15px;
  font-weight: 600;
  color: #f1f5f9;
  letter-spacing: 0.3px;
}
.topbar .meta{
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: #cbd5e1;
}
.topbar .meta i{ width: 14px; height: 14px; opacity: 0.85; }
.topbar .tag{
  display: inline-flex; align-items: center;
  padding: 3px 9px;
  border-radius: 4px;
  background: rgba(43,127,255,0.18);
  color: #93c5fd;
  font-size: 11px;
  font-weight: 500;
}
.topbar .close{
  margin-left: auto;
  width: 30px; height: 30px;
  display: grid; place-items: center;
  border-radius: 6px;
  color: #cbd5e1;
  transition: background 0.15s, color 0.15s;
}
.topbar .close:hover{ background: rgba(255,255,255,0.10); color: #fff; }
.topbar .close i{ width: 18px; height: 18px; }

/* ===== Side Arrows (carousel-style) ===== */
.side-arrow{
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 46px; height: 46px;
  display: grid; place-items: center;
  border-radius: 999px;
  background: rgba(30,30,30,0.55);
  border: 1px solid rgba(255,255,255,0.06);
  color: #e2e8f0;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: background 0.15s, transform 0.15s;
  z-index: 15;
  cursor: pointer;
}
.side-arrow:hover{ background: rgba(60,60,60,0.75); transform: translateY(-50%) scale(1.04); }
.side-arrow.left{ left: 24px; }
.side-arrow.right{ right: 24px; }
.side-arrow i{ width: 22px; height: 22px; }

/* ===== Drag hint ===== */
.drag-hint{
  position: absolute;
  left: 50%; bottom: 180px;
  transform: translateX(-50%);
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 4px;
  background: rgba(0,0,0,0.55);
  color: #cbd5e1;
  font-size: 12px;
  z-index: 5;
  border: 1px solid rgba(255,255,255,0.08);
  pointer-events: none;
}
.drag-hint i{ width: 13px; height: 13px; opacity: 0.8; }

/* ===== Bottom Center Mode Tabs ===== */
.mode-tabs{
  position: absolute;
  left: 50%; bottom: 132px;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 0;
  background: rgba(20,20,20,0.7);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 3px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 12;
}
.mode-tabs button{
  padding: 6px 18px;
  font-size: 12px;
  font-weight: 500;
  color: #cbd5e1;
  border-radius: 4px;
  transition: background 0.15s, color 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.mode-tabs button.active{
  background: var(--primary, #2b7fff);
  color: #fff;
}
.mode-tabs button.cloud-btn{
  padding: 6px 10px;
  color: #cbd5e1;
}
.mode-tabs button.cloud-btn:hover{ background: rgba(255,255,255,0.08); }
.mode-tabs button.cloud-btn i{ width: 16px; height: 16px; }
.mode-tabs .divider{
  width: 1px; height: 18px;
  background: rgba(255,255,255,0.10);
  margin: 0 4px;
}

/* ===== Right Side Tools ===== */
.right-tools{
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column;
  align-items: center;
  gap: 4px;
  z-index: 12;
}
.right-tools .rt-group{
  display: flex; flex-direction: column;
  gap: 0;
  border-radius: 8px;
  background: rgba(20,20,20,0.65);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  overflow: hidden;
}
.right-tools .rt-btn{
  width: 44px; height: 44px;
  display: flex; flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: transparent;
  color: #cbd5e1;
  border: 0;
  transition: background 0.15s, color 0.15s;
  cursor: pointer;
  position: relative;
}
.right-tools .rt-btn:hover{ background: rgba(255,255,255,0.08); color: #fff; }
.right-tools .rt-btn.active{
  background: rgba(43,127,255,0.25);
  color: #93c5fd;
}
.right-tools .rt-btn i{ width: 18px; height: 18px; }
.right-tools .rt-btn .rt-hint{
  font-size: 9px;
  line-height: 1;
  color: #94a3b8;
  font-weight: 400;
}
.right-tools .rt-btn.active .rt-hint{ color: #93c5fd; }
.right-tools .rt-icon-svg{ color: inherit; flex-shrink: 0; }
.mode-tabs .cloud-btn svg{ pointer-events: none; }
.right-tools .rt-sep{
  width: 24px; height: 1px;
  background: rgba(255,255,255,0.08);
  margin: 2px 0;
}

/* ===== Bottom-left Scale & Percent ===== */
.scale-info{
  position: absolute;
  left: 22px;
  bottom: 80px;
  display: inline-flex; align-items: center; gap: 14px;
  z-index: 12;
  font-size: 12px;
  color: #cbd5e1;
}
.scale-info .kbd-pct{
  display: inline-flex; align-items: center; gap: 6px;
}
.scale-info .kbd-pct i{ width: 14px; height: 14px; opacity: 0.85; }
.scale-info .ratio{
  display: inline-flex; align-items: center; gap: 8px;
  padding-left: 14px;
  border-left: 1px solid rgba(255,255,255,0.08);
}
.scale-info .ratio .ruler{
  position: relative;
  width: 80px; height: 10px;
  display: flex; align-items: center;
  justify-content: space-between;
}
.scale-info .ratio .ruler::before,
.scale-info .ratio .ruler::after{
  content: "";
  height: 8px; width: 1px;
  background: #cbd5e1;
}
.scale-info .ratio .ruler span{
  flex: 1; height: 1px;
  background: #cbd5e1;
  margin: 0 1px;
  align-self: center;
}

/* ===== Bottom-right Coordinate Info ===== */
.coord-info{
  position: absolute;
  right: 22px;
  bottom: 80px;
  display: inline-flex; align-items: center; gap: 14px;
  z-index: 12;
  font-size: 12px;
  color: #cbd5e1;
}
.coord-info .c-icon{
  display: inline-flex; align-items: center; gap: 5px;
}
.coord-info .c-icon i{ width: 13px; height: 13px; opacity: 0.85; }
.coord-info .c-icon b{ color: #f1f5f9; font-weight: 500; }
.coord-info .divider{
  width: 1px; height: 12px;
  background: rgba(255,255,255,0.10);
}

/* ===== Bottom Action Bar ===== */
.action-bar{
  position: absolute;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 2px;
  padding: 4px 6px;
  background: rgba(20,20,20,0.7);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 12;
}
.action-bar .ab-btn{
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 14px;
  border-radius: 6px;
  color: #e2e8f0;
  font-size: 12px;
  font-weight: 450;
  transition: background 0.15s, color 0.15s;
  cursor: pointer;
  white-space: nowrap;
}
.action-bar .ab-btn:hover{ background: rgba(255,255,255,0.08); color: #fff; }
.action-bar .ab-btn.danger:hover{ background: rgba(239,68,68,0.20); color: #fca5a5; }
.action-bar .ab-btn i{ width: 16px; height: 16px; }
.action-bar .ab-divider{
  width: 1px; height: 20px;
  background: rgba(255,255,255,0.10);
  margin: 0 4px;
}

/* ===== Thumbnail Strip ===== */
.thumb-strip{
  position: absolute;
  left: 50%;
  bottom: 64px;
  transform: translateX(-50%);
  display: flex; gap: 6px;
  z-index: 11;
}
.thumb-strip .thumb{
  width: 64px; height: 44px;
  border-radius: 4px;
  background: linear-gradient(135deg, #4a6741, #2d4226);
  border: 2px solid transparent;
  cursor: pointer;
  background-size: cover;
  background-position: center;
  position: relative;
  overflow: hidden;
}
.thumb-strip .thumb::before{
  content: "";
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 6px);
}
.thumb-strip .thumb.active{ border-color: #2b7fff; }
.thumb-strip .thumb.t2{
  background: linear-gradient(135deg, #5a8c4a, #3a5a30);
}

/* ===== Notice ===== */
#view-notice{
  position: fixed; left: 50%; bottom: 24px;
  transform: translateX(-50%) translateY(8px);
  background: rgba(15,23,42,0.88);
  color: #fff;
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 6px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s ease, transform 0.18s ease;
  z-index: 9999;
}
#view-notice.show{ opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="grid-bg"></div>
  <div class="pointcloud" id="pointcloud"></div>

  <!-- Top info bar -->
  <header class="topbar">
    <span class="title" id="topTitle">测试场点云</span>
    <span class="meta">
      <i data-lucide="user"></i>
      <span>云南飞派科技有限公司</span>
    </span>
    <span class="meta">
      <i data-lucide="clock"></i>
      <span id="topTime">2026-06-30 17:54:49 (UTC+08)</span>
    </span>
    <span class="tag" id="topTag">点云</span>
    <button class="close" id="btnClose" title="关闭">
      <i data-lucide="x"></i>
    </button>
  </header>

  <!-- Side nav arrows -->
  <button class="side-arrow left" id="btnPrev" title="上一个">
    <i data-lucide="chevron-left"></i>
  </button>
  <button class="side-arrow right" id="btnNext" title="下一个">
    <i data-lucide="chevron-right"></i>
  </button>

  <!-- Drag rotation hint -->
  <div class="drag-hint">
    <i data-lucide="rotate-3d"></i>
    <span>拖拽旋转地图</span>
  </div>

  <!-- Right tools: 透视图/顶视图 -->
  <div class="right-tools">
    <div class="rt-group">
      <button class="rt-btn active" data-action="perspective" title="透视图">
        <i data-lucide="cuboid"></i>
        <span class="rt-hint">透视图</span>
      </button>
      <button class="rt-btn" data-action="topview" title="顶视图">
        <i data-lucide="map"></i>
        <span class="rt-hint">顶视图</span>
      </button>
    </div>
  </div>

  <!-- Bottom center mode tabs (RGB/Height + 点云颗粒变大/变小) -->
  <div class="mode-tabs">
    <button class="active" data-mode="rgb">RGB</button>
    <button data-mode="height">高度</button>
    <div class="divider"></div>
    <button class="cloud-btn" data-action="particle-up" title="点云颗粒变大">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <circle cx="4" cy="10" r="1.8" fill="currentColor" opacity="0.5"/>
        <circle cx="9" cy="10" r="2.8" fill="currentColor" opacity="0.7"/>
        <circle cx="15.5" cy="10" r="4.2" fill="currentColor"/>
      </svg>
    </button>
    <button class="cloud-btn" data-action="particle-down" title="点云颗粒变小">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <circle cx="4.5" cy="10" r="4.2" fill="currentColor"/>
        <circle cx="11" cy="10" r="2.8" fill="currentColor" opacity="0.7"/>
        <circle cx="16" cy="10" r="1.8" fill="currentColor" opacity="0.5"/>
      </svg>
    </button>
  </div>

  <!-- Bottom-left: 比例尺 + 百分比 -->
  <div class="scale-info">
    <span class="kbd-pct">
      <i data-lucide="keyboard"></i>
      <span>100%</span>
    </span>
    <span class="ratio">
      <span style="font-variant-numeric: tabular-nums;">300 m</span>
      <span class="ruler"><span></span></span>
    </span>
  </div>

  <!-- Bottom-right: 坐标系 + 高度 -->
  <div class="coord-info">
    <span class="c-icon">ASL: <b id="aslVal">-61652.5 m</b></span>
    <span class="divider"></span>
    <span class="c-icon">HAE: <b id="haeVal">-61685.3 m</b></span>
    <span class="divider"></span>
    <span class="c-icon"><i data-lucide="globe-2"></i><b>WGS 84</b></span>
  </div>

  <!-- Thumbnail strip -->
  <div class="thumb-strip">
    <div class="thumb active" id="thumb1"></div>
    <div class="thumb t2" id="thumb2"></div>
  </div>

  <!-- Bottom action bar: 地图取消加载 / 下载 / 编辑 / 删除 -->
  <div class="action-bar">
    <button class="ab-btn" data-action="ab-cancel-map" title="地图取消加载">
      <i data-lucide="ban"></i>
      <span>地图取消加载</span>
    </button>
    <div class="ab-divider"></div>
    <button class="ab-btn" data-action="ab-download" title="下载">
      <i data-lucide="download"></i>
      <span>下载</span>
    </button>
    <button class="ab-btn" data-action="ab-edit" title="编辑">
      <i data-lucide="pen-tool"></i>
      <span>编辑</span>
    </button>
    <div class="ab-divider"></div>
    <button class="ab-btn danger" data-action="ab-delete" title="删除">
      <i data-lucide="trash-2"></i>
      <span>删除</span>
    </button>
  </div>
</div>

<div id="view-notice"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide && window.lucide.createIcons) lucide.createIcons();

/* ===========================================================
   1) Mock 3D Point Cloud — generate CSS voxels (purely visual)
   =========================================================== */
(function renderPointCloud(){
  var pc = document.getElementById('pointcloud');
  if (!pc) return;
  var frag = document.createDocumentFragment();
  var COLS = 90, ROWS = 55;
  // Define irregular patches to mimic terrain
  var patches = [
    // Upper-left slope (gray/tan)
    { x0: 0,  y0: 0,  x1: 25, y1: 22, c: 'gray' },
    { x0: 0,  y0: 22, x1: 12, y1: 40, c: 'tan' },
    { x0: 0,  y0: 0,  x1: 40, y1: 12, c: 'tan' },
    // Middle large green field
    { x0: 15, y0: 17, x1: 55, y1: 50, c: 'green' },
    { x0: 25, y0: 12, x1: 65, y1: 25, c: 'lightgreen' },
    { x0: 55, y0: 25, x1: 80, y1: 50, c: 'darkgreen' },
    { x0: 65, y0: 15, x1: 90, y1: 40, c: 'olive' },
    // Right-top edge
    { x0: 80, y0: 0,  x1: 90, y1: 17, c: 'gray' },
    { x0: 50, y0: 0,  x1: 90, y1: 10, c: 'tan' },
    // Path / road (light tan strip)
    { x0: 12, y0: 15, x1: 45, y1: 19, c: 'tan' },
    { x0: 45, y0: 19, x1: 72, y1: 23, c: 'tan' },
    { x0: 25, y0: 45, x1: 50, y1: 47, c: 'tan' },
    // Red roof building (top-right)
    { x0: 62, y0: 15, x1: 72, y1: 25, c: 'red' },
    // White building (mid-left)
    { x0: 47, y0: 35, x1: 55, y1: 40, c: 'white' },
    // Blue shed (bottom-left)
    { x0: 27, y0: 27, x1: 35, y1: 35, c: 'blue' },
    // Cyan / water area (bottom-right)
    { x0: 50, y0: 40, x1: 80, y1: 50, c: 'cyan' },
    // Brown patch (lower-right slope)
    { x0: 72, y0: 27, x1: 90, y1: 40, c: 'brown' },
  ];
  function inAnyP(x, y) {
    for (var i=0; i<patches.length; i++) {
      var p = patches[i];
      if (x >= p.x0 && x <= p.x1 && y >= p.y0 && y <= p.y1) return p.c;
    }
    return null;
  }
  function isEdge(x, y) {
    if (inAnyP(x, y) === null) return false;
    // outline detection
    for (var dx=-1; dx<=1; dx++) {
      for (var dy=-1; dy<=1; dy++) {
        if (dx===0 && dy===0) continue;
        if (inAnyP(x+dx, y+dy) === null) return true;
      }
    }
    return false;
  }
  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var c = inAnyP(x, y);
      if (!c) continue;
      // density fallback
      if ((x*7 + y*13) % 3 === 0) continue;
      var el = document.createElement('div');
      el.className = 'vox ' + c;
      el.style.left = (x * 8) + 'px';
      el.style.top  = (y * 8) + 'px';
      // vertical offset (z) — fake relief by raising the back
      var z = 0;
      if (y < ROWS*0.4) z = (ROWS*0.4 - y) * 2.4;
      el.style.transform = 'translateZ(' + z + 'px)';
      el.style.opacity = isEdge(x,y) ? '0.95' : '0.85';
      frag.appendChild(el);
    }
  }
  pc.appendChild(frag);
})();

/* ===========================================================
   2) Top time auto-refresh
   =========================================================== */
(function updateTime(){
  var t = document.getElementById('topTime');
  if (!t) return;
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function tick(){
    var d = new Date();
    var ymd = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    var hms = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    t.textContent = ymd + ' ' + hms + ' (UTC+08)';
  }
  tick();
  setInterval(tick, 1000);
})();

/* ===========================================================
   3) Read query string to fill title
   =========================================================== */
(function fillFromQuery(){
  try {
    var sp = new URLSearchParams(window.location.search);
    var name = sp.get('name');
    var tag = sp.get('tag');
    if (name) document.getElementById('topTitle').textContent = decodeURIComponent(name);
    if (tag)  document.getElementById('topTag').textContent  = decodeURIComponent(tag);
  } catch (e) {}
})();

/* ===========================================================
   4) Helpers
   =========================================================== */
function showNotice(msg) {
  var n = document.getElementById('view-notice');
  n.textContent = msg;
  n.classList.add('show');
  clearTimeout(n._t);
  n._t = setTimeout(function(){ n.classList.remove('show'); }, 1800);
}

/* ===========================================================
   5) Events
   =========================================================== */
(function bind(){
  // Close
  var btnClose = document.getElementById('btnClose');
  btnClose.addEventListener('click', function(){
    if (document.referrer) { history.back(); }
    else { showNotice('已关闭（占位）'); }
  });

  // Prev / Next
  document.getElementById('btnPrev').addEventListener('click', function(){
    showNotice('上一个模型（占位）');
  });
  document.getElementById('btnNext').addEventListener('click', function(){
    showNotice('下一个模型（占位）');
  });

  // Mode tabs
  document.querySelectorAll('.mode-tabs [data-mode]').forEach(function(b){
    b.addEventListener('click', function(){
      document.querySelectorAll('.mode-tabs [data-mode]').forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      showNotice('切换到' + (b.textContent || '') + '模式（占位）');
    });
  });

  // 点云颗粒变大/变小 (in mode-tabs)
  document.querySelectorAll('.mode-tabs [data-action]').forEach(function(b){
    b.addEventListener('click', function(){
      var a = b.dataset.action;
      if (a === 'particle-up') {
        var voxels = document.querySelectorAll('.vox');
        voxels.forEach(function(v){
          var w = parseFloat(v.style.width || 4) * 1.35;
          var h = parseFloat(v.style.height || 4) * 1.35;
          v.style.width  = Math.min(w, 18) + 'px';
          v.style.height = Math.min(h, 18) + 'px';
        });
        showNotice('点云颗粒变大');
      } else if (a === 'particle-down') {
        var voxels = document.querySelectorAll('.vox');
        voxels.forEach(function(v){
          var w = parseFloat(v.style.width || 4) * 0.75;
          var h = parseFloat(v.style.height || 4) * 0.75;
          v.style.width  = Math.max(w, 1) + 'px';
          v.style.height = Math.max(h, 1) + 'px';
        });
        showNotice('点云颗粒变小');
      }
    });
  });

  // ---- Right tools: 透视图 / 顶视图 ----
  document.querySelectorAll('.right-tools .rt-btn[data-action]').forEach(function(b){
    b.addEventListener('click', function(){
      var a = b.dataset.action;
      if (a === 'perspective') {
        document.querySelectorAll('.right-tools .rt-btn[data-action]').forEach(function(x){ x.classList.remove('active'); });
        b.classList.add('active');
        var pc = document.getElementById('pointcloud');
        if (pc) pc.style.transform = 'translate(-50%, -50%) rotateX(58deg) rotateZ(-18deg)';
        showNotice('透视图');
      } else if (a === 'topview') {
        document.querySelectorAll('.right-tools .rt-btn[data-action]').forEach(function(x){ x.classList.remove('active'); });
        b.classList.add('active');
        var pc = document.getElementById('pointcloud');
        if (pc) pc.style.transform = 'translate(-50%, -50%) rotateX(0deg) rotateZ(0deg)';
        showNotice('顶视图');
      }
    });
  });

  // Action bar
  document.querySelectorAll('.action-bar [data-action]').forEach(function(b){
    b.addEventListener('click', function(){
      var a = b.dataset.action;
      if (a === 'ab-cancel-map') {
        showNotice('地图加载已取消（占位）');
      } else if (a === 'ab-download') {
        showNotice('开始下载（占位）');
      } else if (a === 'ab-edit') {
        showNotice('进入编辑模式（占位）');
      } else if (a === 'ab-delete') {
        showNotice('确认删除？(占位)');
      } else {
        showNotice('功能占位：' + a);
      }
    });
  });

  // Thumbnail switch
  document.querySelectorAll('.thumb-strip .thumb').forEach(function(t){
    t.addEventListener('click', function(){
      document.querySelectorAll('.thumb-strip .thumb').forEach(function(x){ x.classList.remove('active'); });
      t.classList.add('active');
      showNotice('已切换缩略图（占位）');
    });
  });

  // ESC closes
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') {
      if (document.referrer) history.back();
      else showNotice('ESC 关闭（占位）');
    }
  });
})();

if (window.lucide && window.lucide.createIcons) lucide.createIcons();
</script>
</body>
</html>
